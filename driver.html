<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>BYTE Driver</title>
<meta name="robots" content="noindex,nofollow"/>
<link rel="icon" type="image/png" href="images/logo.png"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet"/>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
        --primary: #ff7f00;
        --primary-glow: rgba(255,127,0,0.4);
        --bg: #090705;
        --card: #111009;
        --border: rgba(255,255,255,0.06);
        --muted: #666;
    }
    body { font-family:'Outfit',sans-serif; background:var(--bg); color:#fff; min-height:100vh; }

    /* ── PIN SCREEN ───────────────────────── */
    #pin-screen {
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        padding: 2rem;
        background: radial-gradient(ellipse at center, rgba(255,127,0,0.07) 0%, transparent 70%);
    }
    #pin-screen img { height: 70px; margin-bottom: 0.5rem; }
    .pin-label { font-size:0.8rem; text-transform:uppercase; letter-spacing:2px; color:var(--muted); }
    .pin-title { font-size:1.6rem; font-weight:900; color:var(--primary); text-transform:uppercase; letter-spacing:2px; }
    .pin-digits { display:flex; gap:0.75rem; }
    .pin-digit {
        width: 54px; height: 62px;
        background: var(--card);
        border: 2px solid var(--border);
        border-radius: 12px;
        color: #fff;
        font-size: 1.8rem;
        font-weight: 800;
        text-align: center;
        font-family: inherit;
        transition: border-color 0.2s;
        -webkit-text-security: disc;
    }
    .pin-digit:focus { outline:none; border-color:var(--primary); }
    .pin-error { color:#ff4444; font-size:0.88rem; min-height:1.2rem; text-align:center; }
    .pin-btn {
        padding: 0.9rem 3rem;
        background: var(--primary);
        color: #fff;
        border: none;
        border-radius: 50px;
        font-family: inherit;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 1px;
        text-transform: uppercase;
        box-shadow: 0 4px 20px var(--primary-glow);
    }

    /* ── DASHBOARD ────────────────────────── */
    #dashboard { display:none; max-width:480px; margin:0 auto; padding:1.5rem; min-height:100vh; }

    .dash-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-bottom: 1rem;
        margin-bottom: 1.5rem;
        border-bottom: 1px solid var(--border);
    }
    .dash-header img { height: 44px; }

    .gps-pill {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 50px;
        padding: 0.3rem 0.9rem;
        font-size: 0.8rem;
        color: var(--muted);
        transition: all 0.3s;
    }
    .gps-pill.live { border-color:rgba(68,255,136,0.4); color:#44ff88; }
    .gps-dot { width:8px; height:8px; border-radius:50%; background:#444; transition:background 0.3s; }
    .gps-pill.live .gps-dot { background:#44ff88; animation:blink 1.5s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .dash-title { font-size:1.6rem; font-weight:900; text-transform:uppercase; margin-bottom:0.25rem; }
    .dash-sub { color:var(--muted); font-size:0.9rem; margin-bottom:1.5rem; }

    /* Order cards */
    .orders-list { display:flex; flex-direction:column; gap:0.75rem; }

    .empty-state {
        text-align: center;
        color: var(--muted);
        padding: 4rem 2rem;
    }
    .empty-state .icon { font-size:3rem; margin-bottom:1rem; display:block; }

    .order-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 1.25rem;
        transition: border-color 0.3s;
    }
    .order-card.delivering { border-color:var(--primary); background:rgba(255,127,0,0.05); }

    .card-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.75rem;
    }
    .order-num { font-size:1.05rem; font-weight:800; color:var(--primary); letter-spacing:1px; }
    .order-time { font-size:0.78rem; color:var(--muted); }

    .order-tag {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.25rem 0.75rem;
        border-radius: 20px;
        font-size:0.75rem;
        font-weight:700;
        text-transform:uppercase;
        letter-spacing:0.5px;
        margin-bottom: 1rem;
    }
    .tag-confirmed  { background:rgba(255,200,0,0.1);  color:#ffcc00; }
    .tag-delivering { background:rgba(255,127,0,0.12); color:var(--primary); }

    .card-btns { display:flex; gap:0.6rem; }

    .btn-start {
        flex: 1;
        padding: 0.75rem;
        background: var(--primary);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-family: inherit;
        font-size: 0.9rem;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.2s;
    }
    .btn-start:hover { background:#e07000; }
    .btn-start:disabled { background:rgba(255,127,0,0.25); cursor:not-allowed; }

    .btn-done {
        flex: 1;
        padding: 0.75rem;
        background: rgba(68,255,136,0.08);
        color: #44ff88;
        border: 1px solid rgba(68,255,136,0.25);
        border-radius: 10px;
        font-family: inherit;
        font-size: 0.9rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
    }
    .btn-done:hover { background:rgba(68,255,136,0.18); }
</style>
</head>
<body>

<!-- PIN -->
<div id="pin-screen">
    <img src="images/logo-white.svg" style="height:42px!important;margin:0!important;width:auto" alt="BYTE Burgers"/>
    <div class="pin-label">Restricted Access</div>
    <div class="pin-title">Driver Mode</div>
    <div class="pin-digits">
        <input class="pin-digit" id="p1" maxlength="1" inputmode="numeric" type="password" autocomplete="off"/>
        <input class="pin-digit" id="p2" maxlength="1" inputmode="numeric" type="password" autocomplete="off"/>
        <input class="pin-digit" id="p3" maxlength="1" inputmode="numeric" type="password" autocomplete="off"/>
        <input class="pin-digit" id="p4" maxlength="1" inputmode="numeric" type="password" autocomplete="off"/>
    </div>
    <div class="pin-error" id="pin-error"></div>
    <button class="pin-btn" onclick="checkPin()">Unlock</button>
</div>

<!-- NAV PICKER MODAL -->
<div id="nav-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:999;align-items:flex-end;justify-content:center;">
    <div style="background:#1a1208;border:1px solid rgba(255,127,0,0.2);border-radius:20px 20px 0 0;padding:1.5rem;width:100%;max-width:480px;">
        <div style="font-size:.75rem;text-transform:uppercase;letter-spacing:2px;color:#666;margin-bottom:.5rem;text-align:center;">Open navigation in</div>
        <div style="font-weight:800;font-size:1rem;margin-bottom:1.25rem;text-align:center;color:#fff" id="nav-address-label"></div>
        <div style="display:flex;flex-direction:column;gap:.65rem;" id="nav-btns"></div>
        <button onclick="closeNavModal()" style="margin-top:1rem;width:100%;padding:.75rem;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#aaa;font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer;">Cancel</button>
    </div>
</div>

<!-- NEW ORDER ALERT BANNER (in-page fallback, works on all browsers) -->
<div id="new-order-banner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9999;
     background:#ff7f00;color:#fff;padding:1rem 1.25rem;font-family:Outfit,sans-serif;
     font-weight:800;font-size:1rem;text-align:center;cursor:pointer;
     box-shadow:0 4px 20px rgba(255,127,0,0.5);animation:bannerSlide .3s ease;">
    🔔 NEW ORDER! Tap to view
</div>
<style>@keyframes bannerSlide{from{transform:translateY(-100%)}to{transform:translateY(0)}}</style>

<!-- DASHBOARD -->
<div id="dashboard">
    <div class="dash-header">
        <img src="images/logo-white.svg" style="height:42px!important;margin:0!important;width:auto" alt="BYTE"/>
        <div style="display:flex;align-items:center;gap:.6rem">
            <button id="notif-btn" onclick="enableNotifications()" style="display:none;
                padding:.3rem .8rem;background:rgba(255,127,0,0.15);border:1px solid rgba(255,127,0,0.4);
                border-radius:50px;color:#ff7f00;font-family:inherit;font-size:.75rem;font-weight:700;cursor:pointer">
                🔔 Enable Alerts
            </button>
            <div class="gps-pill" id="gps-pill">
                <div class="gps-dot"></div>
                <span id="gps-txt">GPS off</span>
            </div>
        </div>
    </div>
    <div class="dash-title">Active Orders</div>
    <div class="dash-sub" id="dash-sub">Loading…</div>
    <div class="orders-list" id="orders-list"></div>
</div>

<script src="js/config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
    let DRIVER_PIN = '2580'; // default — overridden by Firebase on load

    firebase.initializeApp(CONFIG.firebase);
    const db = firebase.database();

    let gpsInterval = null;
    let activeOrder  = null;
    let pinReady = false;

    // Load PIN from Firebase before allowing unlock
    db.ref('settings/driverPin').once('value', snap => {
        if (snap.val()) DRIVER_PIN = snap.val();
        pinReady = true;
    });
    // Fallback: if Firebase takes >3s, allow entry with default PIN
    setTimeout(() => { pinReady = true; }, 3000);

    // ── PIN ──────────────────────────────────
    const digits = ['p1','p2','p3','p4'].map(id => document.getElementById(id));

    digits.forEach((input, i) => {
        input.addEventListener('input', () => {
            if (input.value && i < digits.length - 1) digits[i + 1].focus();
            if (digits.map(d => d.value).join('').length === 4) checkPin();
        });
        input.addEventListener('keydown', e => {
            if (e.key === 'Backspace' && !input.value && i > 0) digits[i - 1].focus();
        });
    });

    function getPin() { return digits.map(d => d.value).join(''); }

    function checkPin() {
        if (!pinReady) {
            document.getElementById('pin-error').textContent = 'Loading… try again in a second.';
            digits.forEach(d => d.value = '');
            digits[0].focus();
            return;
        }
        if (getPin() === DRIVER_PIN) {
            document.getElementById('pin-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            initNotifButton();
            listenOrders();
        } else {
            document.getElementById('pin-error').textContent = 'Wrong PIN — try again.';
            digits.forEach(d => d.value = '');
            digits[0].focus();
        }
    }

    // ── NOTIFICATIONS ────────────────────────
    function initNotifButton() {
        // Show the "Enable Alerts" button if permission not yet granted
        if ('Notification' in window && Notification.permission !== 'granted') {
            document.getElementById('notif-btn').style.display = 'inline-block';
        }
    }

    function enableNotifications() {
        if (!('Notification' in window)) {
            alert('This browser does not support notifications. Try Chrome on Android.');
            return;
        }
        Notification.requestPermission().then(perm => {
            if (perm === 'granted') {
                document.getElementById('notif-btn').style.display = 'none';
                // Test notification so driver knows it works
                new Notification('✅ Alerts enabled!', {
                    body: 'You will be notified when new orders arrive.',
                    icon: 'images/logo.png'
                });
            } else {
                alert('Permission denied. Go to browser Settings → Site settings → Notifications and allow this site.');
            }
        });
    }

    function notifyNewOrder(id, order) {
        // Always show in-page banner (works on all browsers/iOS)
        const banner = document.getElementById('new-order-banner');
        banner.textContent = `🔔 New Order #${id} — ${order.name || 'Customer'} · €${(order.total||0).toFixed(2)}`;
        banner.style.display = 'block';
        banner.onclick = () => { banner.style.display = 'none'; };
        setTimeout(() => { banner.style.display = 'none'; }, 10000);

        // Play sound
        playDing();

        // Also try system notification (Android Chrome / desktop)
        if ('Notification' in window && Notification.permission === 'granted') {
            try {
                const n = new Notification('🔔 New Order #' + id, {
                    body: `${order.name || 'Customer'} · ${order.type || ''} · €${(order.total||0).toFixed(2)}`,
                    icon: 'images/logo.png',
                    tag: 'order-' + id,
                    renotify: true
                });
                n.onclick = () => { window.focus(); n.close(); };
            } catch(e) {}
        }
    }

    function playDing() {
        try {
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.setValueAtTime(880, ctx.currentTime);
            osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.12);
            osc.frequency.setValueAtTime(880, ctx.currentTime + 0.25);
            gain.gain.setValueAtTime(0.5, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
            osc.start(); osc.stop(ctx.currentTime + 0.8);
        } catch(e) {}
    }

    // ── ORDERS ───────────────────────────────
    // Event delegation — handles taps even when cards re-render
    document.getElementById('orders-list').addEventListener('click', e => {
        const startBtn = e.target.closest('.btn-start');
        const doneBtn  = e.target.closest('.btn-done');
        if (startBtn && !startBtn.disabled) showNavPicker(startBtn.dataset.id, startBtn.dataset.address);
        if (doneBtn)  markDelivered(doneBtn.dataset.id);
    });

    let knownOrders = {}; // track current orders to diff updates

    function listenOrders() {
        db.ref('orders').on('value', snap => {
            const all = snap.val() || {};
            const active = Object.entries(all)
                .filter(([, o]) => o.status !== 'delivered' && (o.type||'').toLowerCase() !== 'pickup')
                .sort((a, b) => b[1].created_at - a[1].created_at);

            const sub  = document.getElementById('dash-sub');
            const list = document.getElementById('orders-list');

            if (active.length === 0) {
                knownOrders = {};
                sub.textContent = 'No active orders right now';
                list.innerHTML = '<div class="empty-state"><span class="icon">🛵</span>Waiting for new orders…</div>';
                return;
            }

            sub.textContent = active.length + ' active order' + (active.length > 1 ? 's' : '');

            // Remove cards for orders that are now delivered/gone
            Object.keys(knownOrders).forEach(id => {
                if (!all[id] || all[id].status === 'delivered') {
                    const el = document.getElementById('card-' + id);
                    if (el) el.remove();
                    delete knownOrders[id];
                }
            });

            // Add or update cards without replacing the whole list
            active.forEach(([id, order]) => {
                const existing = document.getElementById('card-' + id);
                const changed  = !knownOrders[id] || knownOrders[id].status !== order.status;
                if (!existing) {
                    // New card — insert at top
                    const div = document.createElement('div');
                    div.innerHTML = cardHTML(id, order);
                    list.prepend(div.firstElementChild);
                    // Notify driver (only after initial load, not on first paint)
                    if (Object.keys(knownOrders).length > 0) notifyNewOrder(id, order);
                } else if (changed) {
                    // Status changed — only update the tag and button state
                    updateCard(existing, order);
                }
                knownOrders[id] = { status: order.status };
            });

            // Clear empty state if it was showing
            const empty = list.querySelector('.empty-state');
            if (empty) empty.remove();
        });
    }

    function isActiveOnThisDevice(id) {
        return activeOrder === id;
    }

    function cardHTML(id, order) {
        const onTheWay  = order.status === 'on_the_way';
        const thisDevice = isActiveOnThisDevice(id);
        const time = new Date(order.created_at).toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' });
        const tagClass = onTheWay ? 'tag-delivering' : 'tag-confirmed';
        const tagText  = onTheWay ? '🛵 On the way' : '⏳ Confirmed';
        // Button only disabled if THIS device is already tracking it
        const startDisabled = thisDevice ? 'disabled' : '';
        const startLabel = thisDevice ? '🛵 Delivering…' : '🛵 Start Delivery';
        return `
        <div class="order-card ${onTheWay ? 'delivering' : ''}" id="card-${id}">
            <div class="card-top">
                <span class="order-num">#${id}</span>
                <span class="order-time">${time}</span>
            </div>
            <div class="order-tag ${tagClass}">${tagText}</div>
            <div style="font-size:.82rem;color:#aaa;margin-bottom:.75rem">${order.name || ''} ${order.address ? '· ' + order.address : ''}</div>
            <div class="card-btns">
                <button class="btn-start" data-id="${id}" data-address="${(order.address||'').replace(/"/g,'')}" ${startDisabled}>
                    ${startLabel}
                </button>
                <button class="btn-done" data-id="${id}">
                    ✅ Delivered
                </button>
            </div>
        </div>`;
    }

    function updateCard(el, order) {
        const id = el.id.replace('card-', '');
        const onTheWay   = order.status === 'on_the_way';
        const thisDevice = isActiveOnThisDevice(id);
        el.className = 'order-card' + (onTheWay ? ' delivering' : '');
        const tag = el.querySelector('.order-tag');
        if (tag) {
            tag.className = 'order-tag ' + (onTheWay ? 'tag-delivering' : 'tag-confirmed');
            tag.textContent = onTheWay ? '🛵 On the way' : '⏳ Confirmed';
        }
        const startBtn = el.querySelector('.btn-start');
        if (startBtn) {
            // Only grey out if this device is already GPS-tracking this order
            startBtn.disabled = thisDevice;
            startBtn.textContent = thisDevice ? '🛵 Delivering…' : '🛵 Start Delivery';
        }
    }

    // ── NAV PICKER ───────────────────────────
    let pendingNavOrderId = null;

    function showNavPicker(orderId, address) {
        pendingNavOrderId = orderId;
        const enc = encodeURIComponent(address || '');
        document.getElementById('nav-address-label').textContent = address || 'No address';
        const apps = [
            {
                name: '🗺 Google Maps',
                url:  `https://www.google.com/maps/dir/?api=1&destination=${enc}&travelmode=driving`,
                color: '#4285F4'
            },
            {
                name: '🧭 Apple Maps',
                url:  `http://maps.apple.com/?daddr=${enc}&dirflg=d`,
                color: '#555'
            },
            {
                name: '🚗 Waze',
                url:  `https://waze.com/ul?q=${enc}&navigate=yes`,
                color: '#33ccff'
            }
        ];
        document.getElementById('nav-btns').innerHTML = apps.map(a => `
            <a href="${a.url}" target="_blank" onclick="onNavChosen()"
               style="display:block;padding:.85rem 1rem;background:rgba(255,255,255,0.05);
                      border:1px solid rgba(255,255,255,0.1);border-radius:12px;
                      color:#fff;font-family:inherit;font-size:.95rem;font-weight:700;
                      text-decoration:none;text-align:center;">
                ${a.name}
            </a>`).join('');
        const modal = document.getElementById('nav-modal');
        modal.style.display = 'flex';
    }

    function onNavChosen() {
        closeNavModal();
        if (pendingNavOrderId) startDelivery(pendingNavOrderId);
    }

    function closeNavModal() {
        document.getElementById('nav-modal').style.display = 'none';
    }

    // ── GPS TRACKING ─────────────────────────
    function startDelivery(orderId) {
        if (!navigator.geolocation) {
            alert('GPS is not supported on this device.');
            return;
        }

        // Stop any existing GPS stream
        if (gpsInterval) { clearInterval(gpsInterval); gpsInterval = null; }

        activeOrder = orderId;
        db.ref('orders/' + orderId).update({ status: 'on_the_way' });

        const pill  = document.getElementById('gps-pill');
        const label = document.getElementById('gps-txt');
        label.textContent = 'Getting GPS…';

        function send() {
            navigator.geolocation.getCurrentPosition(pos => {
                pill.classList.add('live');
                label.textContent = 'GPS live';
                db.ref('orders/' + orderId).update({
                    driver_lat: pos.coords.latitude,
                    driver_lng: pos.coords.longitude
                });
            }, err => {
                pill.classList.remove('live');
                if (err.code === 1) {
                    label.textContent = 'GPS blocked';
                    alert('Location permission denied. Please enable it in your browser settings and try again.');
                    clearInterval(gpsInterval);
                    gpsInterval = null;
                } else {
                    label.textContent = 'GPS error — retrying';
                }
            }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
        }

        send();
        gpsInterval = setInterval(send, 5000);
    }

    function markDelivered(orderId) {
        if (activeOrder === orderId) {
            clearInterval(gpsInterval);
            gpsInterval = null;
            activeOrder = null;
            const pill = document.getElementById('gps-pill');
            pill.classList.remove('live');
            document.getElementById('gps-txt').textContent = 'GPS off';
        }
        db.ref('orders/' + orderId).update({ status:'delivered', driver_lat:null, driver_lng:null });
    }

</script>
</body>
</html>
