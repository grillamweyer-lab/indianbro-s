<main class="order-section container">
<div class="order-form-container gs_reveal">
<div class="order-wrap">
<h1 class="text-gradient gs_reveal_text">Schließen Sie Ihre Bestellung ab</h1>
<form action="#" class="order-form" id="checkout-form" method="POST">
 FormSubmit-Optionen

<!-- Step 1: Fulfillment Type Selector (inline, top of form) -->
<div class="order-summary-box" id="fulfillment-selector" style="background: rgba(255,127,0,0.05); border: 2px solid rgba(255,127,0,0.3); margin-bottom: 0;">
  <label class="form-label" style="margin-bottom: 1rem; display: block;">How would you like your order? <span style="color:var(--primary);">*</span></label>
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
    <button type="button" id="btn-pickup" onclick="chooseFulfillment('pickup')" style="background: rgba(255,127,0,0.08); border: 2px solid rgba(255,255,255,0.15); border-radius: 14px; padding: 1.2rem 0.8rem; cursor: pointer; color: #fff; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; transition: 0.25s;">
      <span style="font-size: 2rem;">🏪</span>
      <span style="font-size: 1rem; font-weight: 800; text-transform: uppercase;">Pickup</span>
      <span style="font-size: 0.78rem; color: var(--text-muted);">No delivery fee</span>
    </button>
    <button type="button" id="btn-delivery" onclick="chooseFulfillment('delivery')" style="background: rgba(255,127,0,0.08); border: 2px solid rgba(255,255,255,0.15); border-radius: 14px; padding: 1.2rem 0.8rem; cursor: pointer; color: #fff; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; transition: 0.25s;">
      <span style="font-size: 2rem;">🛵</span>
      <span style="font-size: 1rem; font-weight: 800; text-transform: uppercase;">Delivery</span>
      <span style="font-size: 0.78rem; color: var(--text-muted);">We bring it to you</span>
    </button>
  </div>
</div>

<div class="order-summary-box">
<label class="form-label">Zu bestellende Artikel</label>
<textarea class="form-input" id="items-field" name="items" placeholder="Listen Sie hier die gewünschten Artikel auf..." required=""></textarea>
</div>
<div class="form-group">
<label class="form-label">Ihr Name</label>
<input class="form-input" name="name" placeholder="John Doe" required="" type="text"/>
</div>
<div class="form-group">
<label class="form-label">Telefonnummer</label>
<input class="form-input" name="phone" placeholder="+31 000 000 000" required="" type="tel"/>
</div>
<!-- Address only shown for Delivery -->
<div class="form-group full-width" id="address-section" style="display: none;">
<label class="form-label">Lieferadresse</label>
<textarea class="form-input" id="address-field" name="address" placeholder="Straße, Ort, Postleitzahl in Solingen"></textarea>
<small id="delivery-status" style="display: block; margin-top: 0.5rem;"></small>
</div>
<div class="order-summary-box" style="background: rgba(255,100,0,0.1); border: 2px solid var(--primary);">
<div style="display: flex; justify-content: space-between; align-items: center;">
<span style="font-weight: bold; font-size: 1.2rem;">Bestellsumme (inkl. Lieferung):</span>
<span data-subtotal="0" id="final-total-display" style="font-size: 1.5rem; color: var(--primary); font-weight: 800;">€0.00</span>
</div>
</div>
<div class="form-group full-width">
<label class="form-label">Zusätzliche Hinweise (optional)</label>
<input class="form-input" name="notes" placeholder="Keine Zwiebeln, zusätzliche Soße usw." type="text"/>
</div>
<button class="btn form-submit" style="width: 100%; padding: 1.2rem; margin-top: 1rem;" type="submit">Bestellung bestätigen</button>
</form>
</div>
</div>
</main>
<!-- Step 2: Cash Payment Modal (Delivery only) -->
<div class="combo-modal" id="cash-modal">
<div class="modal-content">
<h2 class="modal-title text-gradient">Barzahlung</h2>
<p style="text-align: center; margin-bottom: 2rem; color: var(--text-muted);">
                Alle Bestellungen sind <strong>Barzahlung</strong>. Mit welchem Bargeld zahlen Sie?
            </p>
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
<button class="btn" onclick="setCashAmount('Exact Change')" style="background: transparent; border: 1px solid var(--primary); color: var(--primary);" type="button">Genaue Änderung</button>
<button class="btn" onclick="setCashAmount(50)" style="background: transparent; border: 1px solid var(--primary); color: var(--primary);" type="button">Bezahlen mit 50 €</button>
<button class="btn" onclick="setCashAmount(100)" style="background: transparent; border: 1px solid var(--primary); color: var(--primary); grid-column: span 2;" type="button">Bezahlen mit 100 €</button>
</div>
<div class="form-group full-width" style="margin-bottom: 0;">
<label class="form-label">Oder geben Sie einen benutzerdefinierten Betrag ein:</label>
<div style="display: flex; gap: 1rem;">
<input class="form-input" id="custom-cash-input" placeholder="z.B. 20" style="flex: 1;" type="number"/>
<button class="btn" onclick="submitCustomCash()" style="padding: 0 1.5rem;" type="button">Bestätigen</button>
</div>
</div>
<button class="btn" onclick="closeCashModal()" style="width: 100%; margin-top: 1.5rem; background: var(--bg-dark);" type="button">Zurück</button>
</div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
        const STORE_COORDS = { lat: 51.178389, lon: 7.031451 };

        const firebaseConfig = {
            apiKey: "AIzaSyCfAfJkP9EsxPR1Zp7J8jctgSoxIfM_gbE",
            authDomain: "byte-34c84.firebaseapp.com",
            databaseURL: "https://byte-34c84-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "byte-34c84",
            storageBucket: "byte-34c84.firebasestorage.app",
            messagingSenderId: "700610883011",
            appId: "1:700610883011:web:b7e6f16233b67d7976e176"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Radius of the earth in km
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a = 
                Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) * 
                Math.sin(dLon/2) * Math.sin(dLon/2); 
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
            return R * c; // Distance in km
        }

        function deg2rad(deg) {
            return deg * (Math.PI/180);
        }

        function processOrderVAT(fee, distance, isConfirmed) {
            const itemsField = document.getElementById('items-field');
            if(!itemsField.dataset.baseItems) return;
            
            let finalOutput = itemsField.dataset.baseItems.split('\n\n--- VAT Breakdown ---')[0];
            
            let storedVat = localStorage.getItem('byteOrderVATDetails');
            if (storedVat) {
                let vatData = JSON.parse(storedVat);
                
                vatData.delivery_gross = fee;
                vatData.delivery_net = fee / 1.19;
                vatData.delivery_vat_19 = fee - vatData.delivery_net;
                
                vatData.gross_total = vatData.food_gross_total + vatData.beverage_gross_total + vatData.delivery_gross;
                vatData.net_total = vatData.net_food_total + vatData.net_beverage_total + vatData.delivery_net;
                vatData.vat_total = vatData.vat_7_total + vatData.vat_19_total + vatData.delivery_vat_19;
                
                localStorage.setItem('byteOrderVATDetails', JSON.stringify(vatData));
                
                if(fee > 0) {
                    finalOutput += `\n\nDelivery Fee: €${fee.toFixed(2)}`;
                }
                
                finalOutput += `\n\n--- VAT Breakdown ---\n\n`;
                
                if(vatData.food_gross_total > 0) {
                    finalOutput += `Net Food: €${vatData.net_food_total.toFixed(2)}\n`;
                    finalOutput += `VAT (7% Food): €${vatData.vat_7_total.toFixed(2)}\n\n`;
                }
                
                if(vatData.beverage_gross_total > 0) {
                    finalOutput += `Net Drinks: €${vatData.net_beverage_total.toFixed(2)}\n`;
                    finalOutput += `VAT (19% Drinks): €${vatData.vat_19_total.toFixed(2)}\n\n`;
                }
                
                if(fee > 0) {
                    finalOutput += `Net Delivery: €${vatData.delivery_net.toFixed(2)}\n`;
                    finalOutput += `VAT (19% Delivery): €${vatData.delivery_vat_19.toFixed(2)}\n\n`;
                }
                
                finalOutput += `Total VAT: €${vatData.vat_total.toFixed(2)}\n\n`;
                finalOutput += `Final Total: €${vatData.gross_total.toFixed(2)}`;
            }
            itemsField.value = finalOutput;
        }

        async function updateDeliveryFee() {
            const address = document.getElementById('address-field').value;
            const statusEl = document.getElementById('delivery-status');
            const totalEl = document.getElementById('final-total-display');
            const itemsField = document.getElementById('items-field');
            const subtotal = parseFloat(totalEl.dataset.subtotal) || 0;

            if (address.length < 10) return;

            statusEl.innerText = "Calculating distance... 🚚";
            statusEl.style.color = "var(--primary)";

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address + ", Solingen, Germany")}&format=json&limit=1`, {
                    headers: { 'User-Agent': 'ByteBurgers-Order-System' }
                });
                const data = await response.json();

                if (data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lon = parseFloat(data[0].lon);
                    const distance = calculateDistance(STORE_COORDS.lat, STORE_COORDS.lon, lat, lon);
                    
                    const fee = distance < 5 ? 2.00 : 3.50;
                    const total = subtotal + fee;

                    statusEl.innerText = `Distance: ${distance.toFixed(1)}km. Delivery Fee: €${fee.toFixed(2)} ✅`;
                    statusEl.style.color = "#44ff44";
                    totalEl.innerText = `€${total.toFixed(2)}`;
                    
                    // Update hidden field with delivery info
                    processOrderVAT(fee, distance, true);
                } else {
                    statusEl.innerText = "Could not verify address distance. Defaulting to €3.50 fee.";
                    statusEl.style.color = "#ffaa00";
                    totalEl.innerText = `€${(subtotal + 3.50).toFixed(2)}`;
                    
                    // Update hidden field for email delivery summary
                    processOrderVAT(3.50, 0, false);
                }
            } catch (error) {
                console.error("Geocoding error:", error);
                statusEl.innerText = "Error calculating distance. Defaulting to €3.50 fee.";
                totalEl.innerText = `€${(subtotal + 3.50).toFixed(2)}`;
                
                // Update hidden field for email delivery summary
                processOrderVAT(3.50, 0, false);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const items = urlParams.get('items');
            
            if (items) {
                document.getElementById('items-field').dataset.baseItems = items;
                // Extract subtotal from the summary string
                const totalMatch = items.match(/Items Total: €([\d.]+)/);
                if (totalMatch) {
                    const subtotal = parseFloat(totalMatch[1]);
                    const totalDisplay = document.getElementById('final-total-display');
                    totalDisplay.innerText = `€${subtotal.toFixed(2)}`;
                    totalDisplay.dataset.subtotal = subtotal;
                }
                processOrderVAT(0, 0, false);
            }

            // Listen for address blur to calculate fee
            document.getElementById('address-field').addEventListener('blur', updateDeliveryFee);
            
            // Submit handler: if pickup already chosen submit direct, if delivery show cash modal
            const checkoutForm = document.getElementById('checkout-form');
            checkoutForm.addEventListener('submit', function(e) {
                e.preventDefault(); // always block native submit
                if (checkoutForm.dataset.cashConfirmed) return;
                const orderType = document.getElementById('order-type-field').value;
                if (!orderType) {
                    alert('Please select Pickup or Delivery first!');
                    document.getElementById('fulfillment-selector').scrollIntoView({ behavior: 'smooth' });
                    return;
                }
                if (orderType === 'PICKUP') {
                    document.getElementById('payment-field').value = 'CASH: Pickup — Customer pays at store.';
                    checkoutForm.dataset.cashConfirmed = 'true';
                    sessionStorage.setItem('byteOrderType', 'pickup');
                    submitFormViaAjax();
                } else {
                    document.getElementById('cash-modal').classList.add('active');
                }
            });
        });

        // Inline fulfillment selector (replaces modal)
        function chooseFulfillment(type) {
            const orderTypeField = document.getElementById('order-type-field');
            const addressSection = document.getElementById('address-section');
            const addressField = document.getElementById('address-field');
            const totalEl = document.getElementById('final-total-display');
            const subtotal = parseFloat(totalEl.dataset.subtotal) || 0;
            const btnPickup = document.getElementById('btn-pickup');
            const btnDelivery = document.getElementById('btn-delivery');

            // Reset button styles
            btnPickup.style.border = '2px solid rgba(255,255,255,0.15)';
            btnPickup.style.background = 'rgba(255,127,0,0.08)';
            btnDelivery.style.border = '2px solid rgba(255,255,255,0.15)';
            btnDelivery.style.background = 'rgba(255,127,0,0.08)';

            if (type === 'pickup') {
                orderTypeField.value = 'pickup';
                btnPickup.style.border = '2px solid var(--primary)';
                btnPickup.style.background = 'rgba(255,127,0,0.2)';
                addressSection.style.display = 'none';
                addressField.value = 'PICKUP - Customer will collect at store';
                processOrderVAT(0, 0, false);
                totalEl.innerText = `€${subtotal.toFixed(2)}`;
                document.getElementById('delivery-status').innerText = '';
            } else {
                orderTypeField.value = 'delivery';
                btnDelivery.style.border = '2px solid var(--primary)';
                btnDelivery.style.background = 'rgba(255,127,0,0.2)';
                addressSection.style.display = '';
                addressField.value = '';
                addressField.focus();
            }
        }

        async function submitFormViaAjax() {
            const form = document.getElementById('checkout-form');
            const submitBtn = form.querySelector('.form-submit');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Bestellung wird gesendet…';

            // Generate unique order ID and save for tracking page
            const orderType = sessionStorage.getItem('byteOrderType');
            const orderId = 'BYT' + Math.random().toString(36).substr(2, 5).toUpperCase();
            sessionStorage.setItem('byteOrderId', orderId);

            // Save full order data for ALL order types (admin needs to see everything)
            try {
                const form2 = document.getElementById('checkout-form');
                await db.ref('orders/' + orderId).set({
                    status: 'confirmed',
                    created_at: Date.now(),
                    type: orderType,
                    name: form2.querySelector('[name="name"]')?.value || '',
                    phone: form2.querySelector('[name="phone"]')?.value || '',
                    address: document.getElementById('address-field')?.value || '',
                    items: document.getElementById('items-field')?.value || '',
                    payment: document.getElementById('payment-field')?.value || '',
                    notes: form2.querySelector('[name="notes"]')?.value || '',
                    total: parseFloat(document.getElementById('final-total-display')?.textContent?.replace('€','')) || 0
                });
            } catch(e) {}

            const formData = new FormData(form);
            formData.append('Order_ID', '#' + orderId);

            fetch('https://formsubmit.co/pvsheram001@Gmail.com', {
                method: 'POST',
                body: formData,
                headers: { 'Accept': 'application/json' },
                keepalive: true
            }).catch(() => {});

            window.location.href = 'thanks.html?oid=' + orderId + '&type=' + (orderType||'').toLowerCase() + '&v=' + Date.now();
        }

        function closeFulfillmentModal() {}  // kept for safety, no longer used

        function closeCashModal() {
            document.getElementById('cash-modal').classList.remove('active');
        }

        function setCashAmount(val) {
            processCashPayment(val);
        }

        function submitCustomCash() {
            const val = document.getElementById('custom-cash-input').value;
            if(!val || val <= 0) return alert('Please enter a valid cash amount.');
            processCashPayment(parseFloat(val));
        }

        function processCashPayment(inputVal) {
            const form = document.getElementById('checkout-form');
            const hiddenField = document.getElementById('payment-field');
            const orderType = document.getElementById('order-type-field').value;
            
            // If delivery, ensure address is filled
            if (orderType === 'DELIVERY') {
                const addr = document.getElementById('address-field').value.trim();
                if (addr.length < 5) {
                    closeCashModal();
                    alert('Please enter your delivery address before confirming!');
                    document.getElementById('address-field').focus();
                    return;
                }
            }
            
            if (inputVal === 'Exact Change') {
                hiddenField.value = "CASH: Exact Change provided.";
            } else {
                let storedVat = localStorage.getItem('byteOrderVATDetails');
                let finalTotal = 0;
                if(storedVat) {
                    finalTotal = JSON.parse(storedVat).gross_total || 0;
                }
                
                let change = parseFloat(inputVal) - parseFloat(finalTotal);
                if (change < 0) {
                    return alert(`That is not enough to cover the €${finalTotal.toFixed(2)} bill!`);
                }
                hiddenField.value = `CASH: Paying with €${parseFloat(inputVal).toFixed(2)} (Driver must bring €${change.toFixed(2)} change)`;
            }

            form.dataset.cashConfirmed = "true";
            sessionStorage.setItem('byteOrderType', 'delivery');
            closeCashModal();
            submitFormViaAjax();
        }
    </script>
<script src="js/main.js"></script>
